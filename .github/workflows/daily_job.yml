name: Daily Trading Job

on:
  schedule:
    - cron: '45 20 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check secrets configured
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          APCA_BASE_URL: ${{ secrets.APCA_BASE_URL }}
        run: |
          if [ -z "$APCA_API_KEY_ID" ]; then echo "APCA_API_KEY_ID is EMPTY"; else echo "APCA_API_KEY_ID is SET (masked)"; fi
          if [ -z "$APCA_API_SECRET_KEY" ]; then echo "APCA_API_SECRET_KEY is EMPTY"; else echo "APCA_API_SECRET_KEY is SET (masked)"; fi
          if [ -z "$APCA_BASE_URL" ]; then echo "APCA_BASE_URL is EMPTY"; else echo "APCA_BASE_URL is SET (masked)"; fi

      - name: Run daily job
        env:
          APCA_API_KEY_ID:     ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          APCA_BASE_URL:       ${{ secrets.APCA_BASE_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m bot job

      - name: Generate analytics JSON
        if: always()
        run: python scripts/analyse_trades.py --out docs/

      - name: Commit analytics.json to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/analytics.json
          git diff --staged --quiet || git commit -m "chore: update analytics.json [skip ci]"
          git push

      - name: Sync trades_live.csv to Google Drive
        if: always()
        env:
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FILE_ID: "1NOA5b7lYQkp7i6czpqrpnJ9WWfFP3wg-"
        run: python scripts/sync_to_drive.py
