name: Daily Trading Job

on:
  schedule:
    - cron: '15 20 * * 1-5'   # 8:15 pm UTC = 4:15 pm ET (Mon-Fri)
  workflow_dispatch:            # allows manual trigger from the GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node 24 ahead of June 16 deadline

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 5          # kill the run if something hangs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check secrets configured
        env:
          APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          APCA_BASE_URL: ${{ secrets.APCA_BASE_URL }}
        run: |
          if [ -z "$APCA_API_KEY_ID" ]; then echo "APCA_API_KEY_ID is EMPTY"; else echo "APCA_API_KEY_ID is SET (masked)"; fi
          if [ -z "$APCA_API_SECRET_KEY" ]; then echo "APCA_API_SECRET_KEY is EMPTY"; else echo "APCA_API_SECRET_KEY is SET (masked)"; fi
          if [ -z "$APCA_BASE_URL" ]; then echo "APCA_BASE_URL is EMPTY"; else echo "APCA_BASE_URL is SET (masked)"; fi

      - name: Run daily job
        env:
          APCA_API_KEY_ID:     ${{ secrets.APCA_API_KEY_ID }}
          APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
          APCA_BASE_URL:       ${{ secrets.APCA_BASE_URL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python -m bot job
