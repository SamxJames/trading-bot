# Trading bot configuration
# Credentials (APCA_API_KEY_ID etc.) live in .env — never put them here.

# Ticker universe — validated against 20-year backtest (2005-2025, yfinance)
tickers:
  - SPY   # S&P 500 — best win rate (55.6%), reliable trend-follower, Sharpe 0.408
  - QQQ   # Nasdaq 100 — highest Sharpe (0.633), 41 trades, 7.38% return
  - GLD   # Gold ETF — non-correlated, 42.9% win rate, strong diversifier
  - AAPL  # Apple — best balanced performer, 48.6% win rate, 16.38% return, 7.22x R:R
  - NVDA  # Nvidia — highest return (27.19%), extreme R:R (36.63x), low win rate (16.7%)
          # Kept for asymmetric upside — catches mega-trends like 2023 AI rally

# Removed:
# TLT  — 0% win rate, long-only EMA has no edge in a bond bear market
# IWM  — 25% win rate, 0.22x R:R, negative Sharpe across all available data
# MSFT — 23.5% win rate, Sharpe 0.141 (worst of all tickers), redundant vs QQQ

# Strategy
strategy: ema_cross_filtered
timeframe: 1Day

# EMA crossover parameters
fast_period: 20
slow_period: 50

# Filtered strategy settings
trend_sma_period: 150  # relaxed from 200 — less restrictive trend filter
rsi_period: 14
rsi_oversold: 30
rsi_overbought: 75     # relaxed from 70 — lets more BUY signals through
stop_loss_pct: 2.5     # widened from 1.5 — gives trades more room to breathe

# Risk manager
max_positions: 5              # one per ticker
max_notional_per_trade: 500   # USD cap per trade
drawdown_halt_pct: 5          # halt if equity drops 5% from session start

# Notifications: set DISCORD_WEBHOOK_URL in .env or GitHub Actions secrets
