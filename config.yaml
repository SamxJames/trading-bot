# Trading bot configuration
# Credentials (APCA_API_KEY_ID etc.) live in .env — never put them here.

tickers:
  - SPY
  - QQQ
  - GLD
  - AAPL
  - MSFT
  - NVDA

strategy: ema_cross_filtered
timeframe: 1Day

fast_period: 20
slow_period: 50

trend_sma_period: 150  # relaxed from 200 — less restrictive trend filter
rsi_period: 14
rsi_oversold: 30
rsi_overbought: 75     # relaxed from 70 — lets more BUY signals through
stop_loss_pct: 2.5     # widened from 1.5 — gives trades more room to breathe

max_positions: 6
max_notional_per_trade: 500
drawdown_halt_pct: 5

# Notifications: set DISCORD_WEBHOOK_URL in .env or GitHub Actions secrets
